name: Android Verify

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: |
          # Replace :app:assembleDebug with <module-name>:assembleDebug if your primary module differs.
          ./gradlew :app:assembleDebug

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Notify Slack on success
        if: success()
        run: |
          SLACK_TEXT="✅ Android Verify 성공\n• Repo: ${{ github.repository }}\n• Branch: ${{ github.ref_name }}\n• Actor: ${{ github.actor }}\n• Commit: ${{ github.sha }}\n🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SLACK_TEXT_ESCAPED=${SLACK_TEXT//$'\n'/\\n}
          curl -X POST -H "Content-type: application/json" \
            --data "{\"text\":\"$SLACK_TEXT_ESCAPED\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: ${{ failure() }}
        run: |
          SLACK_TEXT="❌ Android Verify 실패\n• Repo: ${{ github.repository }}\n• Branch: ${{ github.ref_name }}\n• Actor: ${{ github.actor }}\n• Commit: ${{ github.sha }}\n🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SLACK_TEXT_ESCAPED=${SLACK_TEXT//$'\n'/\\n}
          curl -X POST -H "Content-type: application/json" \
            --data "{\"text\":\"$SLACK_TEXT_ESCAPED\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
